{{ define "main" }}
  <div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
    <div class="prose dark:prose-invert max-w-xl">

      <h1 class="mb-3 text-4xl font-extrabold">
        {{ i18n "error.404_title" | emojify }}
      </h1>

      <p class="mt-8 mb-6 text-xl text-neutral-400 dark:text-neutral-500">
        {{ i18n "error.404_description" | emojify }}
      </p>

      <div class="my-8 rounded-lg border border-neutral-700 bg-neutral-900 p-4 font-mono text-sm text-neutral-300 text-left">
        <p class="m-0">
          <span class="text-primary-500">$</span> cd /page-not-found
        </p>
        <p class="m-0">
          bash: cd: /page-not-found: No such file or directory
        </p>
      </div>

      <p>
        <a href="{{ "" | relLangURL }}" class="text-primary-500 hover:underline">
         cd ~ # back to homepage
        </a>
      </p>

    </div>
  </div>
{{ end }}
