<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" shape-rendering="crispEdges">
  <defs>
    <style>
      .cloud-far  { fill: #5e6fa3; }
      .cloud-mid  { fill: #689cc5; }
      .cloud-near { fill: #1f71eb; }
      @media (prefers-color-scheme: light) {
        .cloud-near { fill: #0092ff; }
      }
    </style>

    <!-- Small hollow pixel cloud, 6px blocks, reused. -->
    <g id="mini-cloud">
      <rect x="18" y="0"  width="6" height="6"/>
      <rect x="24" y="0"  width="6" height="6"/>
      <rect x="36" y="0"  width="6" height="6"/>
      <rect x="42" y="0"  width="6" height="6"/>
      <rect x="12" y="6"  width="6" height="6"/>
      <rect x="30" y="6"  width="6" height="6"/>
      <rect x="48" y="6"  width="6" height="6"/>
      <rect x="6"  y="12" width="6" height="6"/>
      <rect x="54" y="12" width="6" height="6"/>
      <rect x="0"  y="18" width="6" height="6"/>
      <rect x="60" y="18" width="6" height="6"/>
      <rect x="0"  y="24" width="6" height="6"/>
      <rect x="6"  y="24" width="6" height="6"/>
      <rect x="12" y="24" width="6" height="6"/>
      <rect x="18" y="24" width="6" height="6"/>
      <rect x="24" y="24" width="6" height="6"/>
      <rect x="30" y="24" width="6" height="6"/>
      <rect x="36" y="24" width="6" height="6"/>
      <rect x="42" y="24" width="6" height="6"/>
      <rect x="48" y="24" width="6" height="6"/>
      <rect x="54" y="24" width="6" height="6"/>
      <rect x="60" y="24" width="6" height="6"/>
      <rect x="18" y="18" width="6" height="3" opacity="0.5"/>
      <rect x="36" y="18" width="6" height="3" opacity="0.5"/>
    </g>

    <!-- Each layer is a group of clouds spanning a tall area (1200 high),
         animated as a whole from y=0 to y=600 (one screen height) then
         looping. Because the group is built with a duplicate copy stacked
         600px above, the loop is seamless and there is NO horizontal tile
         seam — it is one continuous field across the full width. -->

    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="white" stop-opacity="0"/>
      <stop offset="0.08" stop-color="white" stop-opacity="1"/>
      <stop offset="0.92" stop-color="white" stop-opacity="1"/>
      <stop offset="1"    stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="edge-fade">
      <rect x="0" y="0" width="800" height="600" fill="url(#fade)"/>
    </mask>
  </defs>

  <g mask="url(#edge-fade)">

    <!-- FAR layer: faint, small, slow. Drifts down-left.
         Two identical copies stacked 600 apart; animating translate by
         (-? , +600) and looping gives continuous diagonal motion with a
         seamless vertical wrap. Horizontal drift handled by the x offset
         in the values so it moves diagonally. -->
    <g class="cloud-far" opacity="0.5">
      <g>
        <!-- copy A -->
        <use href="#mini-cloud" transform="translate(120 -560) scale(0.6)"/>
        <use href="#mini-cloud" transform="translate(520 -460) scale(0.55)"/>
        <use href="#mini-cloud" transform="translate(300 -360) scale(0.6)"/>
        <use href="#mini-cloud" transform="translate(660 -300) scale(0.55)"/>
        <use href="#mini-cloud" transform="translate(60  -240) scale(0.6)"/>
        <use href="#mini-cloud" transform="translate(420 -160) scale(0.55)"/>
        <use href="#mini-cloud" transform="translate(200 -80)  scale(0.6)"/>
        <use href="#mini-cloud" transform="translate(700 -40)  scale(0.55)"/>
        <use href="#mini-cloud" transform="translate(760 -500) scale(0.6)"/>
        <use href="#mini-cloud" transform="translate(740 -200) scale(0.55)"/>
        <!-- copy B (same, +600 y) -->
        <use href="#mini-cloud" transform="translate(120 40)  scale(0.6)"/>
        <use href="#mini-cloud" transform="translate(520 140) scale(0.55)"/>
        <use href="#mini-cloud" transform="translate(300 240) scale(0.6)"/>
        <use href="#mini-cloud" transform="translate(660 300) scale(0.55)"/>
        <use href="#mini-cloud" transform="translate(60  360) scale(0.6)"/>
        <use href="#mini-cloud" transform="translate(420 440) scale(0.55)"/>
        <use href="#mini-cloud" transform="translate(200 520) scale(0.6)"/>
        <use href="#mini-cloud" transform="translate(700 560) scale(0.55)"/>
        <use href="#mini-cloud" transform="translate(760 100) scale(0.6)"/>
        <use href="#mini-cloud" transform="translate(740 400) scale(0.55)"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -200 600" keyTimes="0;1" dur="28s"
          repeatCount="indefinite" calcMode="linear"/>
      </g>
    </g>

    <!-- MID layer -->
    <g class="cloud-mid" opacity="0.7">
      <g>
        <use href="#mini-cloud" transform="translate(260 -540) scale(0.75)"/>
        <use href="#mini-cloud" transform="translate(620 -420) scale(0.7)"/>
        <use href="#mini-cloud" transform="translate(40  -300) scale(0.75)"/>
        <use href="#mini-cloud" transform="translate(440 -200) scale(0.7)"/>
        <use href="#mini-cloud" transform="translate(700 -120) scale(0.75)"/>
        <use href="#mini-cloud" transform="translate(160 -60)  scale(0.7)"/>
        <use href="#mini-cloud" transform="translate(760 -340) scale(0.75)"/>
        <use href="#mini-cloud" transform="translate(740 -480) scale(0.7)"/>
        <use href="#mini-cloud" transform="translate(260 60)  scale(0.75)"/>
        <use href="#mini-cloud" transform="translate(620 180) scale(0.7)"/>
        <use href="#mini-cloud" transform="translate(40  300) scale(0.75)"/>
        <use href="#mini-cloud" transform="translate(440 400) scale(0.7)"/>
        <use href="#mini-cloud" transform="translate(700 480) scale(0.75)"/>
        <use href="#mini-cloud" transform="translate(160 540) scale(0.7)"/>
        <use href="#mini-cloud" transform="translate(760 260) scale(0.75)"/>
        <use href="#mini-cloud" transform="translate(740 120) scale(0.7)"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -200 600" keyTimes="0;1" dur="19s"
          repeatCount="indefinite" calcMode="linear"/>
      </g>
    </g>

    <!-- NEAR layer: boldest, largest, fastest -->
    <g class="cloud-near" opacity="0.9">
      <g>
        <use href="#mini-cloud" transform="translate(380 -520) scale(0.95)"/>
        <use href="#mini-cloud" transform="translate(80  -360) scale(0.9)"/>
        <use href="#mini-cloud" transform="translate(560 -240) scale(0.95)"/>
        <use href="#mini-cloud" transform="translate(240 -100) scale(0.9)"/>
        <use href="#mini-cloud" transform="translate(720 -180) scale(0.95)"/>
        <use href="#mini-cloud" transform="translate(380 80)  scale(0.95)"/>
        <use href="#mini-cloud" transform="translate(80  240) scale(0.9)"/>
        <use href="#mini-cloud" transform="translate(560 360) scale(0.95)"/>
        <use href="#mini-cloud" transform="translate(240 500) scale(0.9)"/>
        <use href="#mini-cloud" transform="translate(720 420) scale(0.95)"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; -200 600" keyTimes="0;1" dur="13s"
          repeatCount="indefinite" calcMode="linear"/>
      </g>
    </g>

  </g>
</svg>
