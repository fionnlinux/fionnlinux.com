  <!-- Handle J curve -->
  <rect x="260" y="298" width="32" height="8" fill="#50FC00"/>
  <rect x="252" y="282" width="8"  height="16" fill="#50FC00"/>
  <rect x="260" y="274" width="16" height="8" fill="#50FC00"/>

