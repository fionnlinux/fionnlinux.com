<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" shape-rendering="crispEdges">
  <!-- Background -->
  <rect x="0" y="0" width="800" height="450" fill="#00180B"/>

  <!-- Rain drops with SMIL animation — staggered durations -->
  <rect x="340" y="80"  width="8" height="20" fill="#84FF4A" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="420" y="70"  width="8" height="20" fill="#50FC00" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="480" y="90"  width="8" height="20" fill="#84FF4A" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="300" y="105" width="8" height="20" fill="#50FC00" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="520" y="75"  width="8" height="20" fill="#84FF4A" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="360" y="115" width="8" height="20" fill="#50FC00" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.6s" repeatCount="indefinite"/>
  </rect>
  <rect x="460" y="108" width="8" height="20" fill="#84FF4A" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.0s" repeatCount="indefinite"/>
  </rect>
  <rect x="280" y="125" width="8" height="20" fill="#50FC00" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.7s" repeatCount="indefinite"/>
  </rect>
  <rect x="540" y="118" width="8" height="20" fill="#84FF4A" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="400" y="85"  width="8" height="20" fill="#50FC00" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="320" y="130" width="8" height="20" fill="#84FF4A" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="500" y="122" width="8" height="20" fill="#50FC00" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="260" y="100" width="8" height="20" fill="#84FF4A" opacity="0.9">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.3s" repeatCount="indefinite"/>
  </rect>
  <rect x="560" y="95"  width="8" height="20" fill="#50FC00" opacity="0.7">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 8; 0 0" dur="1.6s" repeatCount="indefinite"/>
  </rect>

  <!-- Umbrella canopy -->
  <!-- Top highlight — primary-300 -->
  <rect x="392" y="175" width="16" height="8"  fill="#84FF4A"/>
  <rect x="376" y="183" width="48" height="8"  fill="#84FF4A"/>
  <!-- Upper mid — primary-400 -->
  <rect x="352" y="191" width="96"  height="8" fill="#50FC00"/>
  <rect x="328" y="199" width="144" height="8" fill="#50FC00"/>
  <rect x="296" y="207" width="208" height="8" fill="#50FC00"/>
  <!-- Lower rows — primary-500 -->
  <rect x="264" y="215" width="272" height="8" fill="#38B000"/>
  <rect x="224" y="223" width="352" height="8" fill="#38B000"/>
  <rect x="208" y="231" width="384" height="8" fill="#38B000"/>
  <!-- Scalloped bottom edge -->
  <rect x="208" y="239" width="16" height="8"  fill="#38B000"/>
  <rect x="208" y="247" width="8"  height="8"  fill="#38B000"/>
  <rect x="288" y="239" width="16" height="8"  fill="#38B000"/>
  <rect x="288" y="247" width="8"  height="8"  fill="#38B000"/>
  <rect x="368" y="239" width="16" height="8"  fill="#38B000"/>
  <rect x="368" y="247" width="8"  height="8"  fill="#38B000"/>
  <rect x="448" y="239" width="16" height="8"  fill="#38B000"/>
  <rect x="448" y="247" width="8"  height="8"  fill="#38B000"/>
  <rect x="528" y="239" width="16" height="8"  fill="#38B000"/>
  <rect x="528" y="247" width="8"  height="8"  fill="#38B000"/>
  <!-- Centre spoke tip -->
  <rect x="392" y="167" width="16" height="8"  fill="#84FF4A"/>
  <rect x="396" y="159" width="8"  height="8"  fill="#84FF4A"/>
  <!-- Handle stem -->
  <rect x="392" y="255" width="16" height="96" fill="#50FC00"/>
  <!-- Handle J curve -->
  <rect x="360" y="343" width="32" height="8"  fill="#50FC00"/>
  <rect x="352" y="327" width="8"  height="16" fill="#50FC00"/>
  <rect x="360" y="319" width="16" height="8"  fill="#50FC00"/>
</svg>
