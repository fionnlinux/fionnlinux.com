  <rect x="480" y="70"  width="8" height="8" fill="#84FF4A" opacity="0.9"/>
  <rect x="300" y="90"  width="8" height="8" fill="#50FC00" opacity="0.7"/>
  <rect x="520" y="55"  width="8" height="8" fill="#84FF4A" opacity="0.9"/>
  <rect x="360" y="105" width="8" height="8" fill="#50FC00" opacity="0.7"/>
  <rect x="460" y="95"  width="8" height="8" fill="#84FF4A" opacity="0.9"/>
  <rect x="280" y="120" width="8" height="8" fill="#50FC00" opacity="0.7"/>
